; HRMS — Per-directory PHP settings
; This file is read by XAMPP on both Windows and Linux/macOS.
; It overrides values from the global php.ini for this directory.

upload_max_filesize = 10M
post_max_size       = 12M
max_execution_time  = 300
memory_limit        = 256M
display_errors      = Off
log_errors          = On
session.gc_maxlifetime = 7200
